name: CI

on:
  push:
  pull_request:
  schedule:
    # Nightly at 06:00 UTC — same as push; optional browser CT still runs below.
    - cron: "0 6 * * *"

# Cancel in-progress runs for the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: read-only access to repository contents.
permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm run lint

      - name: Type-check
        run: pnpm exec tsc --noEmit --pretty false

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Import gate check
        run: pnpm run check-imports

      - name: Build web export
        run: pnpm build

  ct:
    name: Component Tests (Vitest browser)
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true  # CT is optional — Quality is the required gate

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (for Vitest browser provider)
        run: npx playwright install --with-deps chromium

      - name: Run component tests
        run: pnpm test:ct
        env:
          CI: true

      - name: Upload Vitest browser report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: vitest-browser-report
          path: html/
          retention-days: 7
