<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecumenopolis 4X Viewport</title>
    <style>
        :root {
            --ui-bg: rgba(10, 15, 20, 0.9);
            --ui-border: #00ffff;
            --ui-text: #e0f7fa;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: var(--ui-bg);
            border-bottom: 1px solid var(--ui-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            color: var(--ui-text);
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.15);
            text-transform: uppercase;
        }

        .top-stat { display: flex; align-items: center; gap: 8px; }
        .energy { color: #f1c40f; }
        .data { color: #9b59b6; }
        .durasteel { color: #95a5a6; }

        .floating-label {
            position: absolute;
            transform: translate(-50%, -100%);
            background: rgba(10, 15, 25, 0.85);
            border: 1px solid var(--ui-border);
            border-radius: 2px;
            padding: 4px 10px;
            color: var(--ui-text);
            font-size: 11px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            transition: opacity 0.2s;
            will-change: transform;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }
        
        .floating-label::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 20px;
            background: var(--ui-border);
            opacity: 0.5;
        }

        .city-name-row { display: flex; align-items: center; gap: 6px; letter-spacing: 1px; }

        .pop-badge {
            background: #000;
            border-radius: 2px;
            padding: 2px 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            border: 1px solid var(--ui-border);
            color: var(--ui-border);
        }

        .health-bar {
            width: 100%;
            height: 3px;
            background: #222;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: var(--ui-border);
            width: 80%;
        }

        #advisor-dialog {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            border-left: 4px solid var(--ui-border);
            padding: 15px;
            color: var(--ui-text);
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            display: flex;
            gap: 15px;
            cursor: pointer;
        }

        #advisor-portrait {
            width: 60px;
            height: 60px;
            background: #111;
            border: 1px solid #333;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300ffff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>');
            background-size: cover;
        }

        .dialog-content h4 { margin: 0 0 5px 0; color: var(--ui-border); text-transform: uppercase; letter-spacing: 1px;}
        .dialog-content p { margin: 0; font-size: 13px; line-height: 1.5; color: #ccc;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        <div id="top-bar" class="interactive">
            <div>CYCLE 42.1</div>
            <div class="top-stat energy">⚡ 1,024</div>
            <div class="top-stat durasteel">🏗️ WALL TIER 3</div>
            <div class="top-stat data">💾 +419TB/s</div>
        </div>

        <div id="markers-container"></div>

        <div id="advisor-dialog" class="interactive" onclick="this.style.display='none'">
            <div id="advisor-portrait"></div>
            <div class="dialog-content">
                <h4>Grid Interface Ping</h4>
                <p>Architect, our scouters have breached a new durasteel corridor. We can harvest these superstructure walls to extract Raw Durasteel and High-Density Alloys.</p>
                <p style="color:#666; font-size: 10px; margin-top:5px;">[ Tap to acknowledge ]</p>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS & GLOBALS ---
        // MAP_SIZE is huge to fill the edges. Playable area is a subset of this.
        const MAP_SIZE = 80; 
        const PLAYABLE_MIN = 15;
        const PLAYABLE_MAX = 65;
        const TILE_SIZE = 2; 
        
        const TILE = {
            OCEAN_GRATING: 0,
            FLOOR_CONCRETE: 1,
            FLOOR_ASPHALT: 2,
            WALL_DURASTEEL: 3, 
            WALL_ALLOY: 4      
        };

        let scene, camera, renderer;
        let mapData = [];
        let uiMarkers = []; 
        let interactableMeshes = [];
        let knownRooms = []; 
        
        let cameraTarget = new THREE.Vector3();
        let desiredCameraTarget = new THREE.Vector3();
        let cameraOffset = new THREE.Vector3(); 
        let nexusPos = null; 
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectionRing;

        const input = {
            isDragging: false,
            hasDragged: false,
            previousPosition: { x: 0, y: 0 },
            velocity: { x: 0, y: 0 }
        };

        init();
        animate();

        function init() {
            const canvas = document.getElementById('game-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#03070b'); 
            scene.fog = new THREE.FogExp2('#03070b', 0.010); 

            camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 1, 2000);

            const ambientLight = new THREE.AmbientLight(0x223344, 0.7);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xaaccff, 0.9);
            dirLight.position.set(10, 80, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.left = -60;
            dirLight.shadow.camera.right = 60;
            dirLight.shadow.camera.top = 60;
            dirLight.shadow.camera.bottom = -60;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 200;
            scene.add(dirLight);

            const pLight1 = new THREE.PointLight(0x00ffff, 1.2, 50);
            pLight1.position.set(MAP_SIZE, 10, MAP_SIZE);
            scene.add(pLight1);
            
            generateLabyrinthMap();
            buildCityscapeInstanced();
            populateEntities();
            createSelectionRing();

            setupInput(canvas);
            window.addEventListener('resize', onWindowResize);
        }

        // --- LABYRINTH MAP GENERATION (Carving Algorithm) ---
        function generateLabyrinthMap() {
            // 1. Fill EVERYTHING with solid impassable walls (Ensures infinite edge fill)
            for (let x = 0; x < MAP_SIZE; x++) {
                mapData[x] = [];
                for (let z = 0; z < MAP_SIZE; z++) {
                    // 8% chance for glowing alloy
                    mapData[x][z] = Math.random() > 0.92 ? TILE.WALL_ALLOY : TILE.WALL_DURASTEEL;
                }
            }

            // 2. Carve Rooms within the Playable Bounds
            const numRooms = 25;
            for (let i = 0; i < numRooms; i++) {
                const roomW = Math.floor(Math.random() * 5) + 3; // 3 to 7
                const roomH = Math.floor(Math.random() * 5) + 3;
                
                // Keep rooms inside the playable clamp area
                const roomX = Math.floor(Math.random() * (PLAYABLE_MAX - PLAYABLE_MIN - roomW)) + PLAYABLE_MIN;
                const roomZ = Math.floor(Math.random() * (PLAYABLE_MAX - PLAYABLE_MIN - roomH)) + PLAYABLE_MIN;
                
                knownRooms.push({ cx: Math.floor(roomX + roomW/2), cz: Math.floor(roomZ + roomH/2) });

                for (let x = roomX; x < roomX + roomW; x++) {
                    for (let z = roomZ; z < roomZ + roomH; z++) {
                        mapData[x][z] = TILE.FLOOR_CONCRETE;
                    }
                }
            }

            // 3. Guarantee Pathing: Connect Room(i) to Room(i+1) with Corridors
            for (let i = 0; i < knownRooms.length - 1; i++) {
                const r1 = knownRooms[i];
                const r2 = knownRooms[i+1];
                
                // Randomly pick L-shape direction (Horizontal then Vertical, or Vice Versa)
                if (Math.random() > 0.5) {
                    carveCorridorX(r1.cx, r2.cx, r1.cz);
                    carveCorridorZ(r1.cz, r2.cz, r2.cx);
                } else {
                    carveCorridorZ(r1.cz, r2.cz, r1.cx);
                    carveCorridorX(r1.cx, r2.cx, r2.cz);
                }
            }
        }

        function carveCorridorX(x1, x2, z) {
            const minX = Math.min(x1, x2);
            const maxX = Math.max(x1, x2);
            for (let x = minX; x <= maxX; x++) {
                if (mapData[x][z] !== TILE.FLOOR_CONCRETE) {
                    // Occasionally expose the ocean grating in corridors
                    mapData[x][z] = Math.random() > 0.8 ? TILE.OCEAN_GRATING : TILE.FLOOR_ASPHALT;
                }
            }
        }

        function carveCorridorZ(z1, z2, x) {
            const minZ = Math.min(z1, z2);
            const maxZ = Math.max(z1, z2);
            for (let z = minZ; z <= maxZ; z++) {
                if (mapData[x][z] !== TILE.FLOOR_CONCRETE) {
                    mapData[x][z] = Math.random() > 0.8 ? TILE.OCEAN_GRATING : TILE.FLOOR_ASPHALT;
                }
            }
        }

        // --- HIGH PERFORMANCE INSTANCED MESH GENERATION ---
        function buildCityscapeInstanced() {
            // Materials
            const matConcrete = new THREE.MeshStandardMaterial({ color: 0x3a404a, roughness: 0.9 });
            const matAsphalt = new THREE.MeshStandardMaterial({ color: 0x1f2329, roughness: 0.8 });
            const matDurasteel = new THREE.MeshStandardMaterial({ color: 0x1c2833, roughness: 0.5, metalness: 0.6, flatShading: true });
            const matAlloy = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x004444, metalness: 0.8, roughness: 0.2 });

            const totalTiles = MAP_SIZE * MAP_SIZE;
            
            // Geometries
            const boxGeo = new THREE.BoxGeometry(TILE_SIZE, 1, TILE_SIZE);
            const planeGeo = new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE);
            planeGeo.rotateX(-Math.PI / 2);

            // Instanced Meshes (Allows thousands of identical objects in 1 draw call)
            const instDurasteel = new THREE.InstancedMesh(boxGeo, matDurasteel, totalTiles);
            const instAlloy = new THREE.InstancedMesh(boxGeo, matAlloy, totalTiles);
            const instConcrete = new THREE.InstancedMesh(planeGeo, matConcrete, totalTiles);
            const instAsphalt = new THREE.InstancedMesh(planeGeo, matAsphalt, totalTiles);

            instDurasteel.castShadow = true; instDurasteel.receiveShadow = true;
            instAlloy.castShadow = true; instAlloy.receiveShadow = true;
            instConcrete.receiveShadow = true;
            instAsphalt.receiveShadow = true;

            let countDura = 0, countAlloy = 0, countConc = 0, countAsph = 0;
            const dummy = new THREE.Object3D();

            for (let x = 0; x < MAP_SIZE; x++) {
                for (let z = 0; z < MAP_SIZE; z++) {
                    const type = mapData[x][z];
                    const worldX = x * TILE_SIZE + (TILE_SIZE / 2);
                    const worldZ = z * TILE_SIZE + (TILE_SIZE / 2);

                    if (type === TILE.FLOOR_CONCRETE) {
                        dummy.position.set(worldX, 0, worldZ);
                        dummy.scale.set(1, 1, 1);
                        dummy.updateMatrix();
                        instConcrete.setMatrixAt(countConc++, dummy.matrix);
                    } 
                    else if (type === TILE.FLOOR_ASPHALT) {
                        dummy.position.set(worldX, 0, worldZ);
                        dummy.scale.set(1, 1, 1);
                        dummy.updateMatrix();
                        instAsphalt.setMatrixAt(countAsph++, dummy.matrix);
                    }
                    else if (type === TILE.WALL_DURASTEEL || type === TILE.WALL_ALLOY) {
                        // Create towering skyline effect towards the unplayable edges
                        let distFromCenter = Math.max(Math.abs(x - MAP_SIZE/2), Math.abs(z - MAP_SIZE/2));
                        let heightBase = (distFromCenter > (PLAYABLE_MAX - PLAYABLE_MIN)/2) ? 6 : 2;
                        
                        const height = (Math.random() * 4) + heightBase; 
                        
                        dummy.position.set(worldX, height / 2, worldZ);
                        dummy.scale.set(1, height, 1);
                        dummy.updateMatrix();

                        if (type === TILE.WALL_DURASTEEL) {
                            instDurasteel.setMatrixAt(countDura++, dummy.matrix);
                        } else {
                            instAlloy.setMatrixAt(countAlloy++, dummy.matrix);
                        }
                    }
                    // If TILE.OCEAN_GRATING, we render nothing, letting the global background show through
                }
            }

            // Trim arrays to actual counts for rendering efficiency
            instDurasteel.count = countDura;
            instAlloy.count = countAlloy;
            instConcrete.count = countConc;
            instAsphalt.count = countAsph;

            scene.add(instDurasteel);
            scene.add(instAlloy);
            scene.add(instConcrete);
            scene.add(instAsphalt);

            createOceanGratingBackground();
        }

        function createOceanGratingBackground() {
            // Procedural grid texture
            const canvas = document.createElement('canvas');
            canvas.width = 128; 
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 128, 128);
            ctx.strokeStyle = '#445566';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(128, 128);
            ctx.moveTo(128, 0); ctx.lineTo(0, 128);
            ctx.strokeRect(0,0,128,128);
            ctx.stroke();

            const gratingTex = new THREE.CanvasTexture(canvas);
            gratingTex.wrapS = THREE.RepeatWrapping;
            gratingTex.wrapT = THREE.RepeatWrapping;
            gratingTex.repeat.set(MAP_SIZE, MAP_SIZE);

            // Infinite Grating Background (Sits underneath the whole map)
            const bgGeo = new THREE.PlaneGeometry(MAP_SIZE * TILE_SIZE * 1.5, MAP_SIZE * TILE_SIZE * 1.5);
            bgGeo.rotateX(-Math.PI / 2);
            bgGeo.translate((MAP_SIZE * TILE_SIZE)/2, -0.1, (MAP_SIZE * TILE_SIZE)/2);
            
            const gratingMat = new THREE.MeshStandardMaterial({ 
                map: gratingTex, transparent: true, alphaTest: 0.1, metalness: 0.8, roughness: 0.4
            });
            const gratingMesh = new THREE.Mesh(bgGeo, gratingMat);
            gratingMesh.receiveShadow = true;
            gratingMesh.castShadow = true; 
            scene.add(gratingMesh);

            // Deep Ocean Plate
            const oceanGeo = new THREE.PlaneGeometry(MAP_SIZE * TILE_SIZE * 1.5, MAP_SIZE * TILE_SIZE * 1.5);
            oceanGeo.rotateX(-Math.PI / 2);
            oceanGeo.translate((MAP_SIZE * TILE_SIZE)/2, -6, (MAP_SIZE * TILE_SIZE)/2);
            const oceanMat = new THREE.MeshStandardMaterial({ color: 0x001122, emissive: 0x000511, roughness: 0.1 });
            const oceanMesh = new THREE.Mesh(oceanGeo, oceanMat);
            scene.add(oceanMesh);
            
            const underLight1 = new THREE.PointLight(0x0044aa, 3, 80);
            underLight1.position.set((MAP_SIZE * TILE_SIZE)/2, -2, (MAP_SIZE * TILE_SIZE)/2);
            scene.add(underLight1);
        }

        // --- ENTITIES & UI ---
        function populateEntities() {
            if(knownRooms.length < 2) return;

            // Hub (City)
            const hubRoom = knownRooms[0];
            const hubWorldPos = new THREE.Vector3(
                hubRoom.cx * TILE_SIZE + (TILE_SIZE / 2), 0, hubRoom.cz * TILE_SIZE + (TILE_SIZE / 2)
            );

            const hubGeo = new THREE.ConeGeometry(1.5, 3, 4);
            const hubMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x003333, flatShading: true });
            const hubMesh = new THREE.Mesh(hubGeo, hubMat);
            hubMesh.position.copy(hubWorldPos);
            hubMesh.position.y = 1.5;
            hubMesh.castShadow = true;
            hubMesh.userData = { type: 'city', name: 'NEXUS-PRIME' }; 
            scene.add(hubMesh);

            const clickBoxGeo = new THREE.BoxGeometry(3, 4, 3);
            const clickBoxMat = new THREE.MeshBasicMaterial({visible: false});
            const hubClickBox = new THREE.Mesh(clickBoxGeo, clickBoxMat);
            hubClickBox.position.copy(hubWorldPos);
            hubClickBox.position.y = 2;
            hubClickBox.userData = hubMesh.userData;
            scene.add(hubClickBox);
            interactableMeshes.push(hubClickBox);

            createFloatingLabel("NEXUS-PRIME", "T4", hubWorldPos, true);

            // Mobile Unit
            const unitRoom = knownRooms[knownRooms.length - 1]; // Put it far away
            const unitWorldPos = new THREE.Vector3(
                unitRoom.cx * TILE_SIZE + (TILE_SIZE / 2), 0.5, unitRoom.cz * TILE_SIZE + (TILE_SIZE / 2)
            );

            const unitGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.8), new THREE.MeshStandardMaterial({ color: 0x445566 }));
            body.castShadow = true;
            unitGroup.add(body);

            const turret = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.6), new THREE.MeshStandardMaterial({color: 0xff3333}));
            turret.position.set(0, 0.4, 0.2);
            unitGroup.add(turret);

            unitGroup.position.copy(unitWorldPos);
            unitGroup.rotation.y = Math.PI / 6;
            scene.add(unitGroup);

            const unitClickBox = new THREE.Mesh(clickBoxGeo, clickBoxMat);
            unitClickBox.position.copy(unitWorldPos);
            unitClickBox.userData = { type: 'unit', name: 'EXCAVATOR' };
            scene.add(unitClickBox);
            interactableMeshes.push(unitClickBox);

            createFloatingLabel("EXCAVATOR-X9", "LV1", unitWorldPos, false);
            
            nexusPos = hubWorldPos.clone();
            updateViewport();
        }

        function createSelectionRing() {
            const ringGeo = new THREE.RingGeometry(1.0, 1.2, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
            selectionRing = new THREE.Mesh(ringGeo, ringMat);
            selectionRing.rotateX(-Math.PI / 2);
            selectionRing.position.y = 0.1;
            selectionRing.visible = false;
            scene.add(selectionRing);
        }

        function createFloatingLabel(name, tier, worldPosition, isHub) {
            const container = document.getElementById('markers-container');
            const el = document.createElement('div');
            el.className = 'floating-label interactive';
            
            el.innerHTML = `
                <div class="city-name-row">
                    <div class="pop-badge">${tier}</div>
                    <span>${name}</span>
                </div>
                ${isHub ? `<div class="health-bar"><div class="health-fill" style="width: 100%; background: #00ffff;"></div></div>` : 
                          `<div class="health-bar"><div class="health-fill" style="width: 70%; background: #ff00ff;"></div></div>`}
            `;
            
            el.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                selectEntityAtPosition(worldPosition);
                desiredCameraTarget.copy(worldPosition); // Pan camera to clicked label
            });

            container.appendChild(el);
            uiMarkers.push({ element: el, worldPos: worldPosition.clone().add(new THREE.Vector3(0, 3.5, 0)) });
        }

        // --- RESPONSIVE CAMERA FRAMING ---
        function updateViewport() {
            const isDesktop = window.innerWidth > 768;
            
            if (isDesktop) {
                cameraOffset.set(0, 45, 55); 
            } else {
                cameraOffset.set(0, 25, 30);
            }
            if (nexusPos) desiredCameraTarget.copy(nexusPos);
            
            cameraTarget.copy(desiredCameraTarget);
            camera.position.copy(cameraTarget).add(cameraOffset);
            camera.lookAt(cameraTarget);
        }

        // --- CONTROLS & RAYCASTING ---
        function setupInput(canvas) {
            canvas.addEventListener('pointerdown', (e) => {
                input.isDragging = true;
                input.hasDragged = false;
                input.previousPosition.x = e.clientX;
                input.previousPosition.y = e.clientY;
                input.velocity.x = 0;
                input.velocity.y = 0;
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!input.isDragging) return;

                const deltaX = e.clientX - input.previousPosition.x;
                const deltaY = e.clientY - input.previousPosition.y;

                if (Math.abs(deltaX) > 2 || Math.abs(deltaY) > 2) input.hasDragged = true;

                const panSpeed = cameraOffset.y * 0.0015;
                desiredCameraTarget.x -= deltaX * panSpeed;
                desiredCameraTarget.z -= deltaY * panSpeed;

                // --- CRITICAL CLAMP --- 
                // We clamp panning strictly to the inner PLAYABLE area. 
                // The outer tiles act as the "infinite" cityscape backdrop.
                desiredCameraTarget.x = Math.max(PLAYABLE_MIN * TILE_SIZE, Math.min(PLAYABLE_MAX * TILE_SIZE, desiredCameraTarget.x));
                desiredCameraTarget.z = Math.max(PLAYABLE_MIN * TILE_SIZE, Math.min(PLAYABLE_MAX * TILE_SIZE, desiredCameraTarget.z));

                input.velocity.x = deltaX;
                input.velocity.y = deltaY;

                input.previousPosition.x = e.clientX;
                input.previousPosition.y = e.clientY;
            });

            const onPointerUp = (e) => {
                input.isDragging = false;
                if (!input.hasDragged && e.type === 'pointerup') {
                    handleTap(e.clientX, e.clientY);
                }
            };

            canvas.addEventListener('pointerup', onPointerUp);
            canvas.addEventListener('pointerleave', onPointerUp);
            
            canvas.addEventListener('wheel', (e) => {
                const zoomSpeed = 0.001;
                const zoomFactor = 1 + (e.deltaY * zoomSpeed);
                
                cameraOffset.multiplyScalar(zoomFactor);
                
                const isDesktop = window.innerWidth > 768;
                const minY = isDesktop ? 20 : 12;
                const maxY = isDesktop ? 80 : 50; 
                
                if (cameraOffset.y < minY) cameraOffset.multiplyScalar(minY / cameraOffset.y);
                if (cameraOffset.y > maxY) cameraOffset.multiplyScalar(maxY / cameraOffset.y);
            });
        }

        function handleTap(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length > 0) {
                selectEntityAtPosition(intersects[0].object.position);
                desiredCameraTarget.copy(intersects[0].object.position);
            } else {
                selectionRing.visible = false;
            }
        }

        function selectEntityAtPosition(pos) {
            selectionRing.position.set(pos.x, 0.1, pos.z);
            selectionRing.visible = true;
            selectionRing.scale.set(0.1, 0.1, 0.1);
        }

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (!input.isDragging && (Math.abs(input.velocity.x) > 0.1 || Math.abs(input.velocity.y) > 0.1)) {
                const panSpeed = cameraOffset.y * 0.0015;
                desiredCameraTarget.x -= input.velocity.x * panSpeed;
                desiredCameraTarget.z -= input.velocity.y * panSpeed;
                
                desiredCameraTarget.x = Math.max(PLAYABLE_MIN * TILE_SIZE, Math.min(PLAYABLE_MAX * TILE_SIZE, desiredCameraTarget.x));
                desiredCameraTarget.z = Math.max(PLAYABLE_MIN * TILE_SIZE, Math.min(PLAYABLE_MAX * TILE_SIZE, desiredCameraTarget.z));

                input.velocity.x *= 0.85;
                input.velocity.y *= 0.85;
            }

            cameraTarget.lerp(desiredCameraTarget, 0.1);
            camera.position.copy(cameraTarget).add(cameraOffset);
            camera.lookAt(cameraTarget);

            if (selectionRing.visible) {
                selectionRing.rotation.z += 0.03; 
                if (selectionRing.scale.x < 1) {
                    selectionRing.scale.x += (1 - selectionRing.scale.x) * 0.2;
                    selectionRing.scale.y += (1 - selectionRing.scale.y) * 0.2;
                }
            }

            renderer.render(scene, camera);
            updateUIMarkers();
        }

        function updateUIMarkers() {
            const halfWidth = window.innerWidth / 2;
            const halfHeight = window.innerHeight / 2;
            const tempV = new THREE.Vector3();

            uiMarkers.forEach(marker => {
                tempV.copy(marker.worldPos);
                tempV.project(camera);

                if (tempV.z > 1) {
                    marker.element.style.opacity = '0';
                    marker.element.style.pointerEvents = 'none';
                    return;
                }

                const x = (tempV.x * halfWidth) + halfWidth;
                const y = -(tempV.y * halfHeight) + halfHeight;

                marker.element.style.opacity = '1';
                marker.element.style.pointerEvents = 'auto';
                marker.element.style.transform = `translate(-50%, -100%) translate(${x}px, ${y}px)`;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateViewport(); 
        }
    </script>
</body>
