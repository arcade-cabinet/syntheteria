services:
  - type: web
    name: syntheteria
    runtime: static
    plan: free
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true

    # Rapier WASM requires SharedArrayBuffer, which needs these headers
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

    # SPA routing — all paths serve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
