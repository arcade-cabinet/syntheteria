<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4X Mobile Viewport Prototype v2</title>
    <style>
        :root {
            --ui-bg: rgba(20, 15, 10, 0.85);
            --ui-border: #d4af37; /* Gold */
            --ui-text: #f0e6d2;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Top Bar */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: var(--ui-bg);
            border-bottom: 2px solid var(--ui-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            color: var(--ui-text);
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .top-stat { display: flex; align-items: center; gap: 5px; }
        .gold { color: #ffd700; }
        .science { color: #00bfff; }

        /* Floating City/Unit Labels */
        .floating-label {
            position: absolute;
            transform: translate(-50%, -100%);
            background: rgba(30, 20, 15, 0.9);
            border: 2px solid #5a4a3a;
            border-radius: 6px;
            padding: 4px 8px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            transition: opacity 0.2s;
            will-change: transform;
            cursor: pointer;
        }
        
        /* The banner pole extension */
        .floating-label::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 15px;
            background: #5a4a3a;
        }

        .city-name-row { display: flex; align-items: center; gap: 6px; }

        .pop-badge {
            background: #8b0000;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            border: 1px solid white;
        }

        .health-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: #4caf50;
            width: 80%;
        }

        #advisor-dialog {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--ui-bg);
            border: 2px solid var(--ui-border);
            border-radius: 8px;
            padding: 15px;
            color: var(--ui-text);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            display: flex;
            gap: 15px;
            cursor: pointer;
        }

        #advisor-portrait {
            width: 60px;
            height: 60px;
            background: #333;
            border: 2px solid var(--ui-border);
            border-radius: 4px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
            background-size: cover;
        }

        .dialog-content h4 { margin: 0 0 5px 0; color: #ffeb3b; }
        .dialog-content p { margin: 0; font-size: 14px; line-height: 1.4; }

    </style>
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        <div id="top-bar" class="interactive">
            <div>1970 AD</div>
            <div class="top-stat gold">💰 +102/851</div>
            <div class="top-stat">⚙️ Nuclear Power (4)</div>
            <div class="top-stat science">🧪 +419</div>
        </div>

        <div id="markers-container"></div>

        <div id="advisor-dialog" class="interactive" onclick="this.style.display='none'">
            <div id="advisor-portrait"></div>
            <div class="dialog-content">
                <h4>An inquiry from your Science Advisor..</h4>
                <p>This village has revealed the knowledge of Nuclear Power! Our cities can now utilize Uranium resources (4 extra resources).</p>
                <p style="color:#aaa; font-size: 11px; margin-top:5px;">(Tap to dismiss)</p>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS & GLOBALS ---
        const MAP_SIZE = 30; 
        const TILE_SIZE = 2; 
        
        const TILE_TYPES = {
            WATER: 0,
            PLAINS: 1,
            FOREST: 2,
            MOUNTAIN: 3,
            URANIUM: 4 // Special resource tile
        };

        let scene, camera, renderer;
        let mapData = [];
        let uiMarkers = []; 
        let interactableMeshes = []; // For raycasting clicks
        
        // Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectionRing;

        // Input state
        const input = {
            isDragging: false,
            hasDragged: false, // Distinguish click from drag
            previousPosition: { x: 0, y: 0 },
            velocity: { x: 0, y: 0 }
        };

        init();
        animate();

        function init() {
            const canvas = document.getElementById('game-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#5dade2'); 
            scene.fog = new THREE.FogExp2('#5dade2', 0.015); 

            // Camera Setup
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(MAP_SIZE, 30, MAP_SIZE + 25);
            camera.lookAt(MAP_SIZE, 0, MAP_SIZE);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xfff5e6, 0.9);
            dirLight.position.set(20, 50, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            scene.add(dirLight);

            // Generators
            generateMap();
            createTerrainMesh();
            createProps();
            createTerritoryBorders();
            populateEntities();
            createSelectionRing();

            // Controls
            setupInput(canvas);
            window.addEventListener('resize', onWindowResize);
        }

        // --- MAP GENERATION ---
        function generateMap() {
            for (let x = 0; x < MAP_SIZE; x++) {
                mapData[x] = [];
                for (let z = 0; z < MAP_SIZE; z++) {
                    const distToCenter = Math.sqrt(Math.pow(x - MAP_SIZE/2, 2) + Math.pow(z - MAP_SIZE/2, 2));
                    let type = TILE_TYPES.WATER;

                    if (distToCenter < MAP_SIZE * 0.45) {
                        type = TILE_TYPES.PLAINS;
                        const rand = Math.random();
                        if (rand > 0.90) type = TILE_TYPES.MOUNTAIN;
                        else if (rand > 0.70) type = TILE_TYPES.FOREST;
                        else if (rand > 0.67) type = TILE_TYPES.URANIUM; // Rare resource
                    }
                    mapData[x][z] = type;
                }
            }
        }

        // --- CONTINUOUS TERRAIN MESH ---
        function createTerrainMesh() {
            // High poly plane for smooth rolling hills
            const geometry = new THREE.PlaneGeometry(MAP_SIZE * TILE_SIZE, MAP_SIZE * TILE_SIZE, MAP_SIZE * 2, MAP_SIZE * 2);
            geometry.rotateX(-Math.PI / 2);
            geometry.translate((MAP_SIZE * TILE_SIZE)/2, 0, (MAP_SIZE * TILE_SIZE)/2);

            const colors = [];
            const posAttr = geometry.attributes.position;
            const vertexColor = new THREE.Color();

            const colWater = new THREE.Color('#2980b9');
            const colPlains = new THREE.Color('#7cb342'); // Warmer green

            for (let i = 0; i < posAttr.count; i++) {
                const vx = posAttr.getX(i);
                const vz = posAttr.getZ(i);

                let gridX = Math.floor(vx / TILE_SIZE);
                let gridZ = Math.floor(vz / TILE_SIZE);
                gridX = Math.max(0, Math.min(MAP_SIZE - 1, gridX));
                gridZ = Math.max(0, Math.min(MAP_SIZE - 1, gridZ));

                const type = mapData[gridX][gridZ];
                let yOffset = 0;

                // Smooth noise for rolling hills
                const noise = (Math.sin(vx * 0.5) + Math.cos(vz * 0.5)) * 0.2;

                if (type === TILE_TYPES.WATER) {
                    vertexColor.copy(colWater);
                    yOffset = -0.5;
                } else {
                    vertexColor.copy(colPlains);
                    yOffset = noise;
                    // Slightly darken color based on height to fake ambient occlusion
                    vertexColor.multiplyScalar(1 - (noise * 0.2)); 
                }

                posAttr.setY(i, yOffset);
                colors.push(vertexColor.r, vertexColor.g, vertexColor.b);
            }

            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({ 
                vertexColors: true,
                roughness: 0.9,
                flatShading: true // Gives that stylized 4X look
            });

            const terrainMesh = new THREE.Mesh(geometry, material);
            terrainMesh.receiveShadow = true;
            scene.add(terrainMesh);

            // Deep Water Plane
            const waterGeo = new THREE.PlaneGeometry(MAP_SIZE * TILE_SIZE * 2, MAP_SIZE * TILE_SIZE * 2);
            waterGeo.rotateX(-Math.PI / 2);
            const waterMat = new THREE.MeshStandardMaterial({ color: '#1a5276', roughness: 0.0, transparent: true, opacity: 0.8 });
            const water = new THREE.Mesh(waterGeo, waterMat);
            water.position.set((MAP_SIZE * TILE_SIZE)/2, -0.3, (MAP_SIZE * TILE_SIZE)/2);
            scene.add(water);
        }

        // --- 3D PROPS (Mountains, Trees, Resources) ---
        function createProps() {
            // Reusable geometries/materials to save memory
            const mtnGeo = new THREE.ConeGeometry(0.8, 2.5, 4);
            const mtnMat = new THREE.MeshStandardMaterial({ color: '#7f8c8d', flatShading: true });
            
            const treeGeo = new THREE.IcosahedronGeometry(0.4, 0);
            const treeMat = new THREE.MeshStandardMaterial({ color: '#27ae60', flatShading: true });
            
            // Glowing Uranium Material
            const uranGeo = new THREE.OctahedronGeometry(0.3, 0);
            const uranMat = new THREE.MeshStandardMaterial({ 
                color: '#00ff00', 
                emissive: '#00cc00', 
                emissiveIntensity: 0.6,
                roughness: 0.2,
                transparent: true,
                opacity: 0.9
            });

            // Group to hold all props
            const propsGroup = new THREE.Group();

            for (let x = 0; x < MAP_SIZE; x++) {
                for (let z = 0; z < MAP_SIZE; z++) {
                    const type = mapData[x][z];
                    const worldX = x * TILE_SIZE + (TILE_SIZE / 2);
                    const worldZ = z * TILE_SIZE + (TILE_SIZE / 2);
                    
                    if (type === TILE_TYPES.MOUNTAIN) {
                        // Create a small cluster of peaks
                        for(let i=0; i<3; i++) {
                            const mtn = new THREE.Mesh(mtnGeo, mtnMat);
                            mtn.position.set(
                                worldX + (Math.random() - 0.5), 
                                1.2, 
                                worldZ + (Math.random() - 0.5)
                            );
                            mtn.rotation.y = Math.random() * Math.PI;
                            
                            // Scale variation
                            const s = 0.8 + Math.random() * 0.5;
                            mtn.scale.set(s, s, s);
                            mtn.castShadow = true;
                            mtn.receiveShadow = true;
                            propsGroup.add(mtn);
                        }
                    } else if (type === TILE_TYPES.FOREST) {
                        // Cluster of trees
                        for(let i=0; i<4; i++) {
                            const tree = new THREE.Mesh(treeGeo, treeMat);
                            tree.position.set(
                                worldX + (Math.random() - 0.5) * 1.2, 
                                0.3 + Math.random() * 0.2, 
                                worldZ + (Math.random() - 0.5) * 1.2
                            );
                            tree.castShadow = true;
                            propsGroup.add(tree);
                        }
                    } else if (type === TILE_TYPES.URANIUM) {
                        // Cluster of glowing green crystals (like screenshot)
                        for(let i=0; i<5; i++) {
                            const crystal = new THREE.Mesh(uranGeo, uranMat);
                            crystal.position.set(
                                worldX + (Math.random() - 0.5) * 0.8, 
                                0.2, 
                                worldZ + (Math.random() - 0.5) * 0.8
                            );
                            // Jagged rotation
                            crystal.rotation.set(Math.random(), Math.random(), Math.random());
                            // Pointy scaling
                            crystal.scale.set(0.5, 1.5, 0.5);
                            crystal.castShadow = true;
                            propsGroup.add(crystal);
                        }
                    }
                }
            }
            scene.add(propsGroup);
        }

        // --- CITY TERRITORY BORDERS ---
        function createTerritoryBorders() {
            // Simulates the distinct blue colored border around the city in the screenshot
            const cityX = Math.floor(MAP_SIZE / 2);
            const cityZ = Math.floor(MAP_SIZE / 2);
            
            const radius = 2; // 2 tiles in each direction
            
            // Draw a thick line loop above the terrain
            const borderGeo = new THREE.BufferGeometry();
            const points = [];
            
            const startX = (cityX - radius) * TILE_SIZE;
            const endX = (cityX + radius + 1) * TILE_SIZE;
            const startZ = (cityZ - radius) * TILE_SIZE;
            const endZ = (cityZ + radius + 1) * TILE_SIZE;
            const yOffset = 0.3; // Just above terrain

            // Square border
            points.push(new THREE.Vector3(startX, yOffset, startZ));
            points.push(new THREE.Vector3(endX, yOffset, startZ));
            points.push(new THREE.Vector3(endX, yOffset, endZ));
            points.push(new THREE.Vector3(startX, yOffset, endZ));
            points.push(new THREE.Vector3(startX, yOffset, startZ)); // close loop

            borderGeo.setFromPoints(points);

            // The thick bright blue border line
            const borderMat = new THREE.LineBasicMaterial({ 
                color: '#0044ff', 
                linewidth: 3 // Note: WebGL limits this often to 1px on modern browsers, but we set it anyway
            });
            const borderLine = new THREE.Line(borderGeo, borderMat);
            scene.add(borderLine);

            // A faint transparent fill inside the territory
            const fillGeo = new THREE.PlaneGeometry((radius*2+1)*TILE_SIZE, (radius*2+1)*TILE_SIZE);
            fillGeo.rotateX(-Math.PI/2);
            const fillMat = new THREE.MeshBasicMaterial({
                color: '#0044ff',
                transparent: true,
                opacity: 0.15,
                depthWrite: false
            });
            const fillMesh = new THREE.Mesh(fillGeo, fillMat);
            fillMesh.position.set(cityX * TILE_SIZE + TILE_SIZE/2, yOffset - 0.1, cityZ * TILE_SIZE + TILE_SIZE/2);
            scene.add(fillMesh);
        }

        // --- UNITS & CITIES ---
        function populateEntities() {
            const cityX = Math.floor(MAP_SIZE / 2);
            const cityZ = Math.floor(MAP_SIZE / 2);
            
            // City Mesh (Sci-fi/Modern tower based on screenshot)
            const cityGroup = new THREE.Group();
            
            const towerGeo = new THREE.BoxGeometry(0.8, 2.5, 0.8);
            const towerMat = new THREE.MeshStandardMaterial({ color: '#ecf0f1' });
            const tower = new THREE.Mesh(towerGeo, towerMat);
            tower.position.y = 1.25;
            tower.castShadow = true;
            cityGroup.add(tower);

            // Add an attachment (like a satellite dish/roof)
            const roofGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.2, 8);
            const roofMat = new THREE.MeshStandardMaterial({ color: '#3498db' });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 2.6;
            cityGroup.add(roof);

            const cityWorldPos = new THREE.Vector3(
                cityX * TILE_SIZE + (TILE_SIZE / 2),
                0,
                cityZ * TILE_SIZE + (TILE_SIZE / 2)
            );
            
            cityGroup.position.copy(cityWorldPos);
            // Add custom property for raycasting logic
            cityGroup.userData = { type: 'city', name: 'Washington' }; 
            scene.add(cityGroup);
            
            // Invisible bounding box for easier clicking
            const clickBoxGeo = new THREE.BoxGeometry(1.5, 3, 1.5);
            const clickBoxMat = new THREE.MeshBasicMaterial({visible: false});
            const cityClickBox = new THREE.Mesh(clickBoxGeo, clickBoxMat);
            cityClickBox.position.copy(cityWorldPos);
            cityClickBox.position.y = 1.5;
            cityClickBox.userData = cityGroup.userData;
            scene.add(cityClickBox);
            interactableMeshes.push(cityClickBox);

            createFloatingLabel("Washington", 10, cityWorldPos, true);

            // --- Mobile Unit (Cavalry / Archer placeholder) ---
            const unitX = cityX + 2;
            const unitZ = cityZ + 1;
            const unitWorldPos = new THREE.Vector3(
                unitX * TILE_SIZE + (TILE_SIZE / 2),
                0.6,
                unitZ * TILE_SIZE + (TILE_SIZE / 2)
            );

            // Simple combined mesh for a unit (horse body + rider)
            const unitGroup = new THREE.Group();
            
            const bodyGeo = new THREE.BoxGeometry(0.8, 0.6, 1.2);
            const bodyMat = new THREE.MeshStandardMaterial({ color: '#8d6e63' });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            unitGroup.add(body);

            const riderGeo = new THREE.BoxGeometry(0.5, 0.8, 0.5);
            const riderMat = new THREE.MeshStandardMaterial({ color: '#e74c3c' });
            const rider = new THREE.Mesh(riderGeo, riderMat);
            rider.position.set(0, 0.7, 0);
            rider.castShadow = true;
            unitGroup.add(rider);

            unitGroup.position.copy(unitWorldPos);
            // Angle unit slightly
            unitGroup.rotation.y = -Math.PI / 4;
            scene.add(unitGroup);

            // Invisible click box for unit
            const unitClickBox = new THREE.Mesh(clickBoxGeo, clickBoxMat);
            unitClickBox.position.copy(unitWorldPos);
            unitClickBox.userData = { type: 'unit', name: 'Rider' };
            scene.add(unitClickBox);
            interactableMeshes.push(unitClickBox);

            createFloatingLabel("Zunguin", 12, unitWorldPos, false);
        }

        // --- SELECTION RING (The glowing blue circle) ---
        function createSelectionRing() {
            const ringGeo = new THREE.RingGeometry(0.8, 1.0, 32);
            const ringMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.8
            });
            selectionRing = new THREE.Mesh(ringGeo, ringMat);
            selectionRing.rotateX(-Math.PI / 2);
            selectionRing.position.y = 0.1; // Just above ground
            selectionRing.visible = false; // Hidden by default
            scene.add(selectionRing);
        }

        function createFloatingLabel(name, pop, worldPosition, isCity) {
            const container = document.getElementById('markers-container');
            const el = document.createElement('div');
            el.className = 'floating-label interactive';
            
            el.innerHTML = `
                <div class="city-name-row">
                    <div class="pop-badge">${pop}</div>
                    <span>${name}</span>
                </div>
                ${isCity ? `
                <div class="health-bar">
                    <div class="health-fill" style="width: 100%; background: #00bcd4;"></div>
                </div>` : `
                <div class="health-bar">
                    <div class="health-fill" style="width: 70%; background: #4caf50;"></div>
                </div>
                `}
            `;
            
            // Add click listener to UI label to select unit
            el.addEventListener('pointerdown', (e) => {
                e.stopPropagation(); // Stop from dragging map
                selectEntityAtPosition(worldPosition);
            });

            container.appendChild(el);

            uiMarkers.push({
                element: el,
                worldPos: worldPosition.clone().add(new THREE.Vector3(0, 2.8, 0)) // Pole height
            });
        }

        // --- CONTROLS & RAYCASTING ---
        function setupInput(canvas) {
            canvas.addEventListener('pointerdown', (e) => {
                input.isDragging = true;
                input.hasDragged = false;
                input.previousPosition.x = e.clientX;
                input.previousPosition.y = e.clientY;
                input.velocity.x = 0;
                input.velocity.y = 0;
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!input.isDragging) return;

                const deltaX = e.clientX - input.previousPosition.x;
                const deltaY = e.clientY - input.previousPosition.y;

                if (Math.abs(deltaX) > 2 || Math.abs(deltaY) > 2) {
                    input.hasDragged = true; // User is panning, not clicking
                }

                const panSpeed = 0.05;
                camera.position.x -= deltaX * panSpeed;
                camera.position.z -= deltaY * panSpeed;

                input.velocity.x = deltaX;
                input.velocity.y = deltaY;

                input.previousPosition.x = e.clientX;
                input.previousPosition.y = e.clientY;
            });

            const onPointerUp = (e) => {
                input.isDragging = false;
                
                // If they didn't drag, treat it as a click/tap (Raycasting)
                if (!input.hasDragged && e.type === 'pointerup') {
                    handleTap(e.clientX, e.clientY);
                }
            };

            canvas.addEventListener('pointerup', onPointerUp);
            canvas.addEventListener('pointerleave', onPointerUp);
            
            // Zoom
            canvas.addEventListener('wheel', (e) => {
                const zoomSpeed = 0.02;
                camera.translateZ(e.deltaY * zoomSpeed);
                if (camera.position.y < 10) camera.position.y = 10;
                if (camera.position.y > 60) camera.position.y = 60;
            });
        }

        function handleTap(clientX, clientY) {
            // Convert mouse position to normalized device coordinates (-1 to +1)
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            // Raycast
            raycaster.setFromCamera(mouse, camera);
            
            // Check intersection with our invisible click boxes
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length > 0) {
                // We clicked a unit/city!
                const object = intersects[0].object;
                
                // Snap selection ring to the object's X/Z but keep it on the floor
                selectEntityAtPosition(object.position);
            } else {
                // Clicked empty ground, deselect
                selectionRing.visible = false;
            }
        }

        function selectEntityAtPosition(pos) {
            selectionRing.position.set(pos.x, 0.1, pos.z);
            selectionRing.visible = true;
            
            // Optional: Give it a little bounce/scale animation here
            selectionRing.scale.set(0.1, 0.1, 0.1);
        }

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Camera Inertia
            if (!input.isDragging && (Math.abs(input.velocity.x) > 0.1 || Math.abs(input.velocity.y) > 0.1)) {
                camera.position.x -= input.velocity.x * 0.05;
                camera.position.z -= input.velocity.y * 0.05;
                input.velocity.x *= 0.85;
                input.velocity.y *= 0.85;
            }

            // Animate selection ring (spinning/pulsing)
            if (selectionRing.visible) {
                selectionRing.rotation.z += 0.02; // Rotate around Y (mapped to Z because of rotateX setup)
                // Smooth scale up animation when clicked
                if (selectionRing.scale.x < 1) {
                    selectionRing.scale.x += (1 - selectionRing.scale.x) * 0.2;
                    selectionRing.scale.y += (1 - selectionRing.scale.y) * 0.2;
                }
            }

            renderer.render(scene, camera);
            updateUIMarkers();
        }

        function updateUIMarkers() {
            const halfWidth = window.innerWidth / 2;
            const halfHeight = window.innerHeight / 2;
            const tempV = new THREE.Vector3();

            uiMarkers.forEach(marker => {
                tempV.copy(marker.worldPos);
                tempV.project(camera);

                if (tempV.z > 1) {
                    marker.element.style.opacity = '0';
                    marker.element.style.pointerEvents = 'none';
                    return;
                }

                const x = (tempV.x * halfWidth) + halfWidth;
                const y = -(tempV.y * halfHeight) + halfHeight;

                marker.element.style.opacity = '1';
                marker.element.style.pointerEvents = 'auto';
                marker.element.style.transform = `translate(-50%, -100%) translate(${x}px, ${y}px)`;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
