# Maestro flow: Title screen (web)
# Same as title.yaml but launches a URL. Use when no native dev build is installed.
# URL from config/env only — set MAESTRO_WEB_URL or config/e2e.json (webUrl). No hardcoded port.
# 1. Start web app on the same URL (e.g. npx expo start --web with matching port)
# 2. Run: maestro test -e MAESTRO_WEB_URL=<url> maestro/flows/title-web.yaml
#    Or use scripts/run-maestro-e2e.sh --web (loads config and exports MAESTRO_WEB_URL)
url: "${MAESTRO_WEB_URL}"
---
- launchApp
# Wait for SPA to hydrate and title to appear (web bundle can be slow)
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- assertVisible: "SYNTHETERIA"
- assertVisible: "New Game"
- assertVisible: "Settings"
- assertNotVisible: "Continue"
- tapOn: "Settings"
- assertVisible: "Settings"
- tapOn:
    id: "settings-close"
- assertNotVisible: "System Calibration"
